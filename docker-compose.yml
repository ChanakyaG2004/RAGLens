services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: raglens-postgres
    environment:
      POSTGRES_USER: raglens
      POSTGRES_PASSWORD: raglens
      POSTGRES_DB: raglens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raglens -d raglens"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
